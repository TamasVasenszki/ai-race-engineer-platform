name: CD

# Builds the backend image, pushes it to ECR, and rolls out the new revision on EKS with
# `helm upgrade` of the infra/k8s/backend chart. The cluster, add-ons (AWS Load Balancer
# Controller, Secrets Store CSI driver) and the DATABASE_URL secret are provisioned separately
# (Terraform + infra/k8s/README.md); this workflow only deploys the app.
# No-op until the AWS_DEPLOY_ROLE_ARN repo variable is set to the `github_actions_role_arn`
# Terraform output. The env constants below must match the Terraform resource names
# (defaults derived from project_name = "ai-race-engineer").
#
# Optional repo variables for AI provider support:
#   AI_PROVIDER              — "mock" (default), "claude", "openai", "ollama"
#   ANTHROPIC_SECRET_NAME    — Secrets Manager name (terraform output anthropic_api_key_secret_name)
#   OPENAI_SECRET_NAME       — Secrets Manager name (terraform output openai_api_key_secret_name)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: ai-race-engineer-backend
  EKS_CLUSTER: ai-race-engineer-cluster
  DB_SECRET_NAME: ai-race-engineer/database-url

jobs:
  deploy:
    name: Build & deploy backend
    runs-on: ubuntu-latest
    # Skip until infra is provisioned and the deploy role ARN is configured.
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"

      - name: Deploy backend (helm upgrade)
        run: |
          SET_FLAGS=""
          SET_FLAGS="$SET_FLAGS --set image.repository=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          SET_FLAGS="$SET_FLAGS --set image.tag=${{ github.sha }}"
          SET_FLAGS="$SET_FLAGS --set aws.region=$AWS_REGION"
          SET_FLAGS="$SET_FLAGS --set aws.databaseUrlSecretName=$DB_SECRET_NAME"
          if [ -n "${{ vars.AI_PROVIDER }}" ]; then
            SET_FLAGS="$SET_FLAGS --set env.AI_PROVIDER=${{ vars.AI_PROVIDER }}"
          fi
          if [ -n "${{ vars.ANTHROPIC_SECRET_NAME }}" ]; then
            SET_FLAGS="$SET_FLAGS --set aws.anthropicApiKeySecretName=${{ vars.ANTHROPIC_SECRET_NAME }}"
          fi
          if [ -n "${{ vars.OPENAI_SECRET_NAME }}" ]; then
            SET_FLAGS="$SET_FLAGS --set aws.openaiApiKeySecretName=${{ vars.OPENAI_SECRET_NAME }}"
          fi
          helm upgrade --install ai-race-backend infra/k8s/backend \
            --namespace default $SET_FLAGS \
            --wait --timeout 10m
