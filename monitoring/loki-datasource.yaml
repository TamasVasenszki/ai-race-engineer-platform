# Provisions the Loki data source in Grafana. The kube-prometheus-stack Grafana sidecar imports
# any ConfigMap labeled grafana_datasource (searched in the release namespace, monitoring).
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: true
