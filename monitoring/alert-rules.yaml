# Grafana unified alerting rule (self-contained; kube-prometheus-stack Alertmanager stays off).
# The Grafana sidecar imports any ConfigMap labeled grafana_alert into provisioning/alerting/.
#
# NOTE: datasourceUid "prometheus" assumes the kube-prometheus-stack Prometheus data source uses
# that uid (the common default). If the rule shows a "datasource not found" error in Grafana live,
# read the actual uid (Grafana > Connections > Data sources > Prometheus) and update it here — or
# fall back to a PrometheusRule. This is the highest-risk sub-part of #27 (authored without a live
# Grafana), verified live at the next cluster cycle.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-alert-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  backend-alerts.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: backend-alerts
        folder: AI Race Engineer
        interval: 1m
        rules:
          - uid: backend-5xx-error-rate
            title: Backend 5xx error rate high
            condition: C
            for: 2m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: Backend 5xx error ratio above 5% for 2m.
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  editorMode: code
                  instant: true
                  expr: sum(rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1)
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0.05]
