services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: race_engineer
      POSTGRES_USER: race
      POSTGRES_PASSWORD: race
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
