apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-race-backend-db
  namespace: {{ .Values.namespace }}
  labels:
    app: ai-race-backend
spec:
  provider: aws
  parameters:
    region: {{ .Values.aws.region }}
    # EKS Pod Identity (not IRSA): the provider uses the pod's bound ServiceAccount token to
    # assume the backend role via the Pod Identity association. Requires the CSI driver's
    # CSIDriver spec to carry tokenRequests audiences sts.amazonaws.com + pods.eks.amazonaws.com
    # (see infra/k8s/README.md). Without usePodIdentity the provider falls back to IRSA and fails.
    usePodIdentity: {{ .Values.aws.usePodIdentity | quote }}
    objects: |
      - objectName: "{{ .Values.aws.databaseUrlSecretName }}"
        objectType: "secretsmanager"
        objectAlias: "{{ .Values.secret.key }}"
{{- if .Values.aws.anthropicApiKeySecretName }}
      - objectName: "{{ .Values.aws.anthropicApiKeySecretName }}"
        objectType: "secretsmanager"
        objectAlias: "ANTHROPIC_API_KEY"
{{- end }}
{{- if .Values.aws.openaiApiKeySecretName }}
      - objectName: "{{ .Values.aws.openaiApiKeySecretName }}"
        objectType: "secretsmanager"
        objectAlias: "OPENAI_API_KEY"
{{- end }}
  secretObjects:
    - secretName: {{ .Values.secret.syncedName }}
      type: Opaque
      data:
        - objectName: "{{ .Values.secret.key }}"
          key: {{ .Values.secret.key }}
{{- if or .Values.aws.anthropicApiKeySecretName .Values.aws.openaiApiKeySecretName }}
    - secretName: backend-ai-keys
      type: Opaque
      data:
{{- if .Values.aws.anthropicApiKeySecretName }}
        - objectName: "ANTHROPIC_API_KEY"
          key: ANTHROPIC_API_KEY
{{- end }}
{{- if .Values.aws.openaiApiKeySecretName }}
        - objectName: "OPENAI_API_KEY"
          key: OPENAI_API_KEY
{{- end }}
{{- end }}
