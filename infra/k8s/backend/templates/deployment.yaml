apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-race-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: ai-race-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ai-race-backend
  template:
    metadata:
      labels:
        app: ai-race-backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: AI_PROVIDER
              value: {{ .Values.env.AI_PROVIDER | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.syncedName }}
                  key: {{ .Values.secret.key }}
{{- if .Values.aws.anthropicApiKeySecretName }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-ai-keys
                  key: ANTHROPIC_API_KEY
{{- end }}
{{- if .Values.aws.openaiApiKeySecretName }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-ai-keys
                  key: OPENAI_API_KEY
{{- end }}
          # Mounting the CSI volume is what triggers the secret fetch + sync — it is required,
          # not cosmetic. Without a pod mounting it, the SecretProviderClass never runs and the
          # backend-db k8s Secret is never created.
          volumeMounts:
            - name: db-secret
              mountPath: /mnt/secrets-store
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: db-secret
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ai-race-backend-db
