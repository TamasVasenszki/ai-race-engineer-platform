apiVersion: v1
kind: Service
metadata:
  name: ai-race-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: ai-race-backend
spec:
  type: ClusterIP
  selector:
    app: ai-race-backend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
